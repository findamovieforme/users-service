name: Build and Push Docker Image to ECR

on:
  push:
    branches:
      - main  # Trigger the workflow on pushes to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Configure AWS Credentials by assuming a role
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # Replace with your AWS region
          role-session-name: GitHubActionsSession  # Optional: Name your session
          role-duration-seconds: 1200

      # Step 3: Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 4: Log in to Amazon ECR
      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 265507129430.dkr.ecr.us-east-1.amazonaws.com

      # Step 5: Build and Push Docker Image
      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: 265507129430.dkr.ecr.us-east-1.amazonaws.com  
          ECR_REPOSITORY: users-services  
          IMAGE_TAG: latest
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --push .

      
      # Step 6: Deploy to ECS
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster findamovie-cluster \
            --service findamovie-users-service \
            --force-new-deployment
        env:
          AWS_REGION: us-east-1  # Replace with your AWS region

      # Step 7: Logout from Amazon ECR (Optional Cleanup)
      - name: Logout from Amazon ECR
        run: |
          docker logout $ECR_REGISTRY
